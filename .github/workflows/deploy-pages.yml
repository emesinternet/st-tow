name: Deploy Web To GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Validate deployment variables
        env:
          VITE_SPACETIMEDB_HOST: ${{ vars.VITE_SPACETIMEDB_HOST }}
          VITE_SPACETIMEDB_DB_NAME: ${{ vars.VITE_SPACETIMEDB_DB_NAME }}
        run: |
          if [ -z "$VITE_SPACETIMEDB_HOST" ]; then
            echo "Missing repo variable: VITE_SPACETIMEDB_HOST"
            exit 1
          fi
          if [ -z "$VITE_SPACETIMEDB_DB_NAME" ]; then
            echo "Missing repo variable: VITE_SPACETIMEDB_DB_NAME"
            exit 1
          fi

      - name: Build web
        working-directory: web
        env:
          VITE_SPACETIMEDB_HOST: ${{ vars.VITE_SPACETIMEDB_HOST }}
          VITE_SPACETIMEDB_DB_NAME: ${{ vars.VITE_SPACETIMEDB_DB_NAME }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
