name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            server/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Web formatting
        working-directory: web
        run: npm run format:check

      - name: Web lint
        working-directory: web
        run: npm run lint

      - name: Web module bindings guard
        working-directory: web
        run: npm run check:module-bindings

      - name: Server formatting
        working-directory: server
        run: npm run format:check

      - name: Server lint
        working-directory: server
        run: npm run lint

      - name: Server typecheck
        working-directory: server
        run: npm run typecheck

      - name: Server test
        working-directory: server
        run: npm run test

      - name: Web typecheck
        working-directory: web
        run: npm run typecheck

      - name: Web test
        working-directory: web
        run: npm run test

      - name: Web build
        working-directory: web
        run: npm run build
