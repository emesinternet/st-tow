<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>st-tow POC</title>
    <style>
      :root {
        --bg: #f4efe5;
        --card: #fffaf2;
        --ink: #1d242f;
        --muted: #66707a;
        --line: #d8cdb8;
        --a: #dd5d2a;
        --b: #2a7fc1;
        --ok: #1f9d63;
        --bad: #b23a3a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, #fff5dd 0, transparent 45%),
          radial-gradient(circle at right 10%, #e7f2ff 0, transparent 38%),
          var(--bg);
      }

      .shell {
        width: min(980px, 92vw);
        margin: 2rem auto 3rem;
        display: grid;
        gap: 1rem;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 1rem;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.04);
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
      }

      h1,
      h2 {
        margin: 0;
      }

      h1 {
        font-size: 1.35rem;
      }

      h2 {
        font-size: 1rem;
      }

      .muted {
        color: var(--muted);
      }

      .status {
        padding: 0.35rem 0.6rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        font-size: 0.85rem;
      }

      .status.ok {
        color: var(--ok);
        border-color: color-mix(in srgb, var(--ok), white 60%);
      }

      .status.bad {
        color: var(--bad);
        border-color: color-mix(in srgb, var(--bad), white 60%);
      }

      input,
      button {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0.55rem 0.7rem;
        font: inherit;
      }

      input {
        min-width: 170px;
        background: #fff;
      }

      button {
        background: #1f2730;
        color: #fff;
        cursor: pointer;
      }

      button.secondary {
        background: #fff;
        color: var(--ink);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .split {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .badge {
        display: inline-block;
        font-size: 0.8rem;
        padding: 0.15rem 0.45rem;
        border-radius: 999px;
        border: 1px solid var(--line);
      }

      ul {
        margin: 0.7rem 0 0;
        padding-left: 1.2rem;
      }

      #event-feed {
        max-height: 180px;
        overflow: auto;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
        white-space: pre-wrap;
      }

      @media (max-width: 700px) {
        .split {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card row" style="justify-content: space-between">
        <h1>Spacetime Tug-of-War POC</h1>
        <div id="status" class="status">Connecting...</div>
      </section>

      <section class="card">
        <h2>Join / Host</h2>
        <p class="muted">No auth flow for MVP. Identity token is cached locally.</p>
        <div class="row">
          <input id="display-name" placeholder="Display name" maxlength="24" />
          <input id="join-code" placeholder="Join code" maxlength="8" />
          <button id="join-btn">Join Lobby</button>
          <button id="host-btn" class="secondary">Host Tug-of-War</button>
        </div>
      </section>

      <section id="lobby-card" class="card" hidden>
        <div class="row" style="justify-content: space-between">
          <h2>Lobby</h2>
          <div>
            <span class="badge">Code: <strong id="lobby-code">-</strong></span>
            <span class="badge">Status: <strong id="lobby-status">-</strong></span>
          </div>
        </div>

        <div class="split" style="margin-top: 0.8rem">
          <div>
            <h2 style="font-size: 0.95rem">Team A</h2>
            <ul id="team-a-list"></ul>
          </div>
          <div>
            <h2 style="font-size: 0.95rem">Team B</h2>
            <ul id="team-b-list"></ul>
          </div>
        </div>

        <div class="row" style="margin-top: 0.9rem">
          <button id="start-btn">Start Match</button>
          <button id="reset-btn" class="secondary">Reset Lobby</button>
        </div>
      </section>

      <section id="match-card" class="card" hidden>
        <div class="row" style="justify-content: space-between">
          <h2>Match</h2>
          <div>
            <span class="badge">Phase: <strong id="match-phase">-</strong></span>
            <span class="badge">Timer: <strong id="match-timer">-</strong></span>
          </div>
        </div>

        <div id="tug-panel" style="margin-top: 0.8rem"></div>

        <form id="submit-form" class="row" style="margin-top: 0.9rem">
          <input id="word-input" placeholder="Type word and press Enter" autocomplete="off" />
          <button id="submit-btn" type="submit">Submit</button>
          <span id="player-status" class="muted"></span>
        </form>
      </section>

      <section class="card">
        <h2>Event Feed</h2>
        <div id="event-feed" class="muted">Waiting for events...</div>
      </section>
    </main>

    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
